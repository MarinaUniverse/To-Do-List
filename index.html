<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="./normalize.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrapper fbx container">
      <header class="fbx container">
        <h1>To Do List</h1>
        <h2>Плануй день та досягай більшого 🚀</h2>
      </header>
      <main class="fbx">
        <form action="" id="toDoList">
          <input
            type="text"
            name="task"
            id="taskInput"
            placeholder="Введіть нове завдання"
          />
          <button type="submit" class="addNewTaskBtn">Додати</button>
        </form>

        <section class="wrapperResults fbx">
          <div class="wrapperTasks">
            <h3>Список завдань</h3>
            <ul id="taskList"></ul>
          </div>

          <div class="wrapperHistory">
            <h3 class="history">Історія змін</h3>
            <div id="historyList"></div>
            <button id="clearHistoryButton">🗑 Очистити історію</button>
          </div>
        </section>
      </main>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
